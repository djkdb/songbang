<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#131217">
  <meta name="description" content="내가 부를 수 있는 노래를 저장하고 랜덤으로 뽑아주는 노래방 선곡 도우미">
  <title>송방 — 노래방 선곡 도우미</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <div class="wordmark">송방<span class="dot">.</span></div>
    <div class="kicker">노래방 선곡 도우미</div>
  </header>

  <main>
    <!-- ============ 뽑기 ============ -->
    <section id="tab-pick" class="tab-panel active">
      <div class="panel">
        <div class="field">
          <span class="field-label">어디서 뽑을까</span>
          <div class="seg" id="source-pills">
            <button class="seg-btn active" data-source="my">내 노래</button>
            <button class="seg-btn" data-source="chart">인기차트</button>
            <button class="seg-btn" data-source="both">둘 다</button>
          </div>
        </div>

        <div class="field">
          <span class="field-label">장르</span>
          <div class="chip-row" id="genre-pills">
            <button class="chip active" data-genre="">전체</button>
          </div>
        </div>

        <label class="check">
          <input type="checkbox" id="exclude-today" checked>
          <span class="check-box" aria-hidden="true"></span>
          <span>오늘 뽑은 곡은 빼기</span>
        </label>

        <div class="display" id="slot-machine">
          <span class="display-label">SONG</span>
          <div class="slot-text" id="slot-text" role="status" aria-live="polite">버튼을 누르면<br>한 곡을 골라드려요</div>
        </div>

        <button class="key key-go" id="btn-pick">
          <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="8.5" cy="8.5" r="1.15" fill="currentColor" stroke="none"/><circle cx="15.5" cy="8.5" r="1.15" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.15" fill="currentColor" stroke="none"/><circle cx="8.5" cy="15.5" r="1.15" fill="currentColor" stroke="none"/><circle cx="15.5" cy="15.5" r="1.15" fill="currentColor" stroke="none"/></svg>
          랜덤으로 뽑기
        </button>
        <p class="pool-info" id="pool-info"></p>
      </div>

      <div class="feature-card hidden" id="result-card">
        <div class="feature-kicker">오늘의 선곡</div>
        <div class="result-title" id="result-title"></div>
        <div class="result-artist" id="result-artist"></div>
        <div class="result-meta" id="result-meta"></div>
        <div class="feature-actions">
          <button class="key key-line" id="btn-repick">다시 뽑기</button>
          <button class="key key-fill hidden" id="btn-save-result">내 노래에 담기</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2 class="panel-title">최근 뽑은 노래</h2>
          <button class="link-btn" id="btn-clear-history">기록 지우기</button>
        </div>
        <ul class="history-list" id="history-list">
          <li class="empty-msg">아직 뽑은 노래가 없어요</li>
        </ul>
      </div>
    </section>

    <!-- ============ 내 노래 ============ -->
    <section id="tab-my" class="tab-panel">
      <div class="panel">
        <div class="panel-head">
          <h2 class="panel-title">내 노래 <span class="count" id="my-count">0</span></h2>
          <div class="head-links">
            <button class="link-btn" id="btn-export">내보내기</button>
            <button class="link-btn" id="btn-import">가져오기</button>
            <input type="file" id="import-file" accept=".json,application/json" hidden>
          </div>
        </div>

        <form id="add-form" class="add-form">
          <input type="text" id="input-title" class="text-in" placeholder="노래 제목" required maxlength="80">
          <input type="text" id="input-artist" class="text-in" placeholder="가수" required maxlength="60">
          <div class="form-row">
            <input type="text" id="input-tj" class="text-in" placeholder="TJ 번호" inputmode="numeric" maxlength="8">
            <input type="text" id="input-ky" class="text-in" placeholder="금영 번호" inputmode="numeric" maxlength="8">
          </div>
          <input type="text" id="input-tags" class="text-in" placeholder="태그 (예: 발라드, 고음, 분위기)" maxlength="100">
          <div class="form-row">
            <button type="submit" class="key key-fill" id="btn-add">추가하기</button>
            <button type="button" class="key key-line hidden" id="btn-cancel-edit">취소</button>
          </div>
        </form>
      </div>

      <div class="panel">
        <input type="search" id="my-search" class="text-in search" placeholder="내 노래 검색">
        <ul class="song-list" id="my-song-list">
          <li class="empty-msg">아직 담은 노래가 없어요.</li>
        </ul>
      </div>
    </section>

    <!-- ============ 인기차트 ============ -->
    <section id="tab-chart" class="tab-panel">
      <div class="panel">
        <div class="panel-head">
          <h2 class="panel-title">노래방 인기차트 100</h2>
        </div>
        <div class="seg seg-cat" id="chart-cat">
          <button class="seg-btn active" data-cat="가요">가요</button>
          <button class="seg-btn" data-cat="팝">팝</button>
          <button class="seg-btn" data-cat="J-POP">J-POP</button>
        </div>
        <p class="note" id="chart-note">앱에 담긴 애창곡 차트예요. 하트를 누르면 내 노래에 저장돼요.</p>
        <input type="search" id="chart-search" class="text-in search" placeholder="제목·가수 검색">
        <div class="chip-row wrap" id="chart-genre-pills">
          <button class="chip active" data-genre="">전체</button>
        </div>
        <ul class="song-list chart-list" id="chart-list"></ul>
      </div>
    </section>
  </main>

  <nav class="tabbar">
    <button class="tab-btn active" data-tab="tab-pick" aria-label="뽑기">
      <span class="tab-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="8.5" cy="8.5" r="1.15" fill="currentColor" stroke="none"/><circle cx="15.5" cy="8.5" r="1.15" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.15" fill="currentColor" stroke="none"/><circle cx="8.5" cy="15.5" r="1.15" fill="currentColor" stroke="none"/><circle cx="15.5" cy="15.5" r="1.15" fill="currentColor" stroke="none"/></svg></span>
      <span class="tab-txt">뽑기</span>
    </button>
    <button class="tab-btn" data-tab="tab-my" aria-label="내 노래">
      <span class="tab-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V6l11-2v12"/><circle cx="6.5" cy="18" r="2.6"/><circle cx="17.5" cy="16" r="2.6"/></svg></span>
      <span class="tab-txt">내 노래</span>
    </button>
    <button class="tab-btn" data-tab="tab-chart" aria-label="인기차트">
      <span class="tab-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 20v-5"/><path d="M12 20V5"/><path d="M18 20v-9"/></svg></span>
      <span class="tab-txt">인기차트</span>
    </button>
  </nav>

  <div class="toast" id="toast"></div>

  <script src="js/chart-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

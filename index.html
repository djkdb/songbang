<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f3ead6">
  <meta name="description" content="내가 부를 수 있는 노래를 저장하고 랜덤으로 뽑아주는 노래방 선곡 도우미">
  <title>송방 — 노래방 선곡 도우미</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="masthead">
    <div class="masthead-inner">
      <div class="brand">
        <span class="brand-badge">노래책</span>
        <h1 class="brand-title">송방</h1>
      </div>
      <p class="masthead-tag">오늘 뭐 부르지? · 랜덤 선곡 도우미</p>
    </div>
    <div class="masthead-rule"></div>
  </header>

  <main>
    <!-- ============ 뽑기 ============ -->
    <section id="tab-pick" class="tab-panel active">
      <div class="panel">
        <div class="panel-tab">SELECT</div>

        <div class="field">
          <span class="field-label">어디서 뽑을까</span>
          <div class="seg" id="source-pills">
            <button class="seg-btn active" data-source="my">내 노래</button>
            <button class="seg-btn" data-source="chart">인기차트</button>
            <button class="seg-btn" data-source="both">둘 다</button>
          </div>
        </div>

        <div class="field">
          <span class="field-label">장르</span>
          <div class="chip-row" id="genre-pills">
            <button class="chip active" data-genre="">전체</button>
          </div>
        </div>

        <label class="check">
          <input type="checkbox" id="exclude-today" checked>
          <span class="check-box" aria-hidden="true"></span>
          <span>오늘 이미 뽑은 곡은 빼줘</span>
        </label>

        <div class="display" id="slot-machine">
          <div class="display-screws"><i></i><i></i><i></i><i></i></div>
          <div class="display-screen">
            <div class="slot-text" id="slot-text">아래 버튼을 누르면<br>운명의 한 곡을 골라줄게</div>
          </div>
        </div>

        <button class="key key-go" id="btn-pick">🎲 랜덤으로 뽑기</button>
        <p class="pool-info" id="pool-info"></p>
      </div>

      <div class="ticket hidden" id="result-card">
        <div class="ticket-notch ticket-notch--l"></div>
        <div class="ticket-notch ticket-notch--r"></div>
        <div class="ticket-head">TODAY'S PICK · 오늘의 선곡</div>
        <div class="result-title" id="result-title"></div>
        <div class="result-artist" id="result-artist"></div>
        <div class="result-meta" id="result-meta"></div>
        <div class="ticket-actions">
          <button class="key key-line" id="btn-repick">다시 뽑기</button>
          <button class="key key-fill hidden" id="btn-save-result">＋ 내 노래에 담기</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2 class="panel-title">최근 뽑은 노래</h2>
          <button class="link-btn" id="btn-clear-history">기록 지우기</button>
        </div>
        <ul class="history-list" id="history-list">
          <li class="empty-msg">아직 뽑은 노래가 없어요</li>
        </ul>
      </div>
    </section>

    <!-- ============ 내 노래 ============ -->
    <section id="tab-my" class="tab-panel">
      <div class="panel">
        <div class="panel-head">
          <h2 class="panel-title">내 노래 <span class="count" id="my-count">0</span></h2>
          <div class="head-links">
            <button class="link-btn" id="btn-export">내보내기</button>
            <button class="link-btn" id="btn-import">가져오기</button>
            <input type="file" id="import-file" accept=".json,application/json" hidden>
          </div>
        </div>

        <form id="add-form" class="add-form">
          <input type="text" id="input-title" class="text-in" placeholder="노래 제목" required maxlength="80">
          <input type="text" id="input-artist" class="text-in" placeholder="가수" required maxlength="60">
          <div class="form-row">
            <input type="text" id="input-tj" class="text-in" placeholder="TJ 번호" inputmode="numeric" maxlength="8">
            <input type="text" id="input-ky" class="text-in" placeholder="금영 번호" inputmode="numeric" maxlength="8">
          </div>
          <input type="text" id="input-tags" class="text-in" placeholder="태그 (예: 발라드, 고음, 분위기)" maxlength="100">
          <div class="form-row">
            <button type="submit" class="key key-fill" id="btn-add">＋ 추가하기</button>
            <button type="button" class="key key-line hidden" id="btn-cancel-edit">취소</button>
          </div>
        </form>
      </div>

      <div class="panel">
        <input type="search" id="my-search" class="text-in search" placeholder="내 노래 검색">
        <ul class="song-list" id="my-song-list">
          <li class="empty-msg">아직 담은 노래가 없어요.<br>인기차트에서 ♥를 눌러 담아보세요.</li>
        </ul>
      </div>
    </section>

    <!-- ============ 인기차트 ============ -->
    <section id="tab-chart" class="tab-panel">
      <div class="panel">
        <div class="panel-head">
          <h2 class="panel-title">노래방 인기차트 100</h2>
        </div>
        <p class="note" id="chart-note">앱에 담긴 애창곡 차트예요. ♥를 누르면 내 노래에 저장돼요.</p>
        <input type="search" id="chart-search" class="text-in search" placeholder="제목·가수 검색">
        <div class="chip-row wrap" id="chart-genre-pills">
          <button class="chip active" data-genre="">전체</button>
        </div>
        <ul class="song-list chart-list" id="chart-list"></ul>
      </div>
    </section>
  </main>

  <nav class="tabbar">
    <button class="tab-btn active" data-tab="tab-pick">
      <span class="tab-ico">🎲</span><span class="tab-txt">뽑기</span>
    </button>
    <button class="tab-btn" data-tab="tab-my">
      <span class="tab-ico">🎵</span><span class="tab-txt">내 노래</span>
    </button>
    <button class="tab-btn" data-tab="tab-chart">
      <span class="tab-ico">📖</span><span class="tab-txt">인기차트</span>
    </button>
  </nav>

  <div class="toast" id="toast"></div>

  <script src="js/chart-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

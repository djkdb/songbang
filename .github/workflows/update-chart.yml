name: 인기차트 자동 업데이트

# TJ미디어 노래방 TOP100을 매월 1일에 긁어 data/chart.json 으로 커밋한다.
# (스케줄 트리거는 기본 브랜치에 이 파일이 있을 때만 동작함)

on:
  schedule:
    - cron: "0 18 1 * *" # 매월 1일 18:00 UTC ≈ KST 익일 새벽 3시
  workflow_dispatch: {} # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: update-chart
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: TJ 인기차트 가져오기
        run: node scripts/update-chart.mjs

      - name: 자동완성 DB 누적 갱신
        run: node scripts/build-song-index.mjs

      - name: 변경분 커밋 & 푸시
        run: |
          if git diff --quiet -- data/chart.json data/songs.json; then
            echo "변경 없음 — 커밋 건너뜀"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/chart.json data/songs.json
            git commit -m "chore: 인기차트·자동완성 DB 자동 업데이트 ($(date -u +%Y-%m-%d))"
            git push
          fi
